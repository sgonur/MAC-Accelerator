# Tiny Tapeout project information
project:
  title:        "MAC Accelerator"      # Project title
  author:       "Satvik Gonur"      # Your name
  discord:      "tron_21"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A compact bit-serial multiply-accumulate (MAC) unit controlled by a finite state machine."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_sgonur_mac"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "fsm.v"
    - "mac_core.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "A[0] (multiplicand LSB)"
  ui[1]: "A[1]"
  ui[2]: "A[2]"
  ui[3]: "A[3] (multiplicand MSB)"
  ui[4]: "B[0] (multiplier LSB)"
  ui[5]: "B[1]"
  ui[6]: "B[2]"
  ui[7]: "B[3] (multiplier MSB)"


  # Outputs
  uo[0]: "Product[0]"
  uo[1]: "Product[1]"
  uo[2]: "Product[2]"
  uo[3]: "Product[3]"
  uo[4]: "Product[4]"
  uo[5]: "Product[5]"
  uo[6]: "Product[6]"
  uo[7]: "Product[7]"

  # Bidirectional pins
  uio[0]: "Start (input) / Done (output)"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
